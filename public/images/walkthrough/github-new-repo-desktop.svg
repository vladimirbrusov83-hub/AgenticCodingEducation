<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="760" fill="#ffffff"/>
  <rect x="16" y="16" width="1168" height="728" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="52" cy="44" r="6.5" fill="#f87171"/>
  <circle cx="74" cy="44" r="6.5" fill="#fbbf24"/>
  <circle cx="96" cy="44" r="6.5" fill="#34d399"/>
  <rect x="150" y="31" width="560" height="26" rx="13" fill="#f5f5f4"/>
  <text x="172" y="49" font-size="14" fill="#78716c">github.com/new</text>
  <line x1="16" y1="76" x2="1184" y2="76" stroke="#e7e5e4" stroke-width="1.5"/>

  <circle cx="72" cy="140" r="16" fill="#1c1917"/>
  <text x="100" y="147" font-size="22" font-weight="700" fill="#1c1917">GitHub</text>
  <text x="60" y="204" font-size="28" font-weight="700" fill="#1c1917">Create a new repository</text>

  <!-- name -->
  <text x="60" y="264" font-size="15" font-weight="600" fill="#44403c">Repository name</text>
  <text x="200" y="264" font-size="14" fill="#0F6E56">✓ available</text>
  <rect x="60" y="278" width="500" height="46" rx="9" fill="#ffffff" stroke="#0F6E56" stroke-width="2"/>
  <text x="80" y="307" font-size="16" fill="#1c1917">class-quiz</text>
  <text x="60" y="352" font-size="13" fill="#a8a29e">A short, plain name is all you need.</text>

  <!-- visibility -->
  <text x="60" y="412" font-size="15" font-weight="600" fill="#44403c">Who can see it?</text>
  <!-- public (selected) -->
  <circle cx="76" cy="452" r="11" fill="#ffffff" stroke="#185FA5" stroke-width="2.5"/>
  <circle cx="76" cy="452" r="5" fill="#185FA5"/>
  <text x="100" y="452" font-size="16" font-weight="600" fill="#1c1917">Public</text>
  <text x="100" y="474" font-size="13" fill="#78716c">Anyone can see it — the right choice for this course.</text>
  <!-- private (unselected) -->
  <circle cx="76" cy="516" r="11" fill="#ffffff" stroke="#d6d3d1" stroke-width="2.5"/>
  <text x="100" y="516" font-size="16" font-weight="500" fill="#57534e">Private</text>
  <text x="100" y="538" font-size="13" fill="#a8a29e">Only you can see it.</text>

  <rect x="60" y="586" width="220" height="48" rx="10" fill="#238636"/>
  <text x="170" y="616" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Create repository</text>
</svg>
