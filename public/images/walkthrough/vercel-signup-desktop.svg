<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="760" fill="#ffffff"/>
  <rect x="16" y="16" width="1168" height="728" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="52" cy="44" r="6.5" fill="#f87171"/>
  <circle cx="74" cy="44" r="6.5" fill="#fbbf24"/>
  <circle cx="96" cy="44" r="6.5" fill="#34d399"/>
  <rect x="150" y="31" width="560" height="26" rx="13" fill="#f5f5f4"/>
  <text x="172" y="49" font-size="14" fill="#78716c">vercel.com/signup</text>
  <line x1="16" y1="76" x2="1184" y2="76" stroke="#e7e5e4" stroke-width="1.5"/>

  <!-- logo + title -->
  <polygon points="588,140 612,140 600,118" fill="#111111"/>
  <text x="600" y="204" font-size="26" font-weight="700" fill="#111111" text-anchor="middle">Create your account</text>
  <text x="600" y="236" font-size="15" fill="#78716c" text-anchor="middle">The fastest way in is with the account you just made.</text>

  <!-- card -->
  <rect x="400" y="280" width="400" height="332" rx="14" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>

  <!-- Continue with GitHub (primary) -->
  <rect x="432" y="316" width="336" height="50" rx="10" fill="#111111"/>
  <circle cx="470" cy="341" r="11" fill="#ffffff"/>
  <text x="600" y="347" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Continue with GitHub</text>

  <!-- secondary options (muted) -->
  <rect x="432" y="380" width="336" height="50" rx="10" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="600" y="411" font-size="15" font-weight="500" fill="#78716c" text-anchor="middle">Continue with Email</text>

  <line x1="432" y1="470" x2="560" y2="470" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="600" y="475" font-size="13" fill="#a8a29e" text-anchor="middle">free plan</text>
  <line x1="640" y1="470" x2="768" y2="470" stroke="#e7e5e4" stroke-width="1.5"/>

  <text x="600" y="524" font-size="13" fill="#a8a29e" text-anchor="middle">No credit card required.</text>
</svg>
