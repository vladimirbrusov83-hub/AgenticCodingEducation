<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="760" fill="#ffffff"/>
  <rect x="16" y="16" width="1168" height="728" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="52" cy="44" r="6.5" fill="#f87171"/>
  <circle cx="74" cy="44" r="6.5" fill="#fbbf24"/>
  <circle cx="96" cy="44" r="6.5" fill="#34d399"/>
  <rect x="150" y="31" width="560" height="26" rx="13" fill="#f5f5f4"/>
  <text x="172" y="49" font-size="14" fill="#78716c">github.com/you/class-quiz/upload</text>
  <line x1="16" y1="76" x2="1184" y2="76" stroke="#e7e5e4" stroke-width="1.5"/>

  <!-- header -->
  <circle cx="72" cy="140" r="16" fill="#1c1917"/>
  <text x="100" y="147" font-size="22" font-weight="700" fill="#1c1917">GitHub</text>
  <text x="60" y="204" font-size="15" fill="#78716c">class-quiz  /  Upload files</text>

  <!-- drop zone -->
  <rect x="60" y="236" width="1080" height="360" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
  <!-- file card being dragged in -->
  <g>
    <rect x="500" y="316" width="200" height="128" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
    <path d="M540 348 h84 l16 16 v52 a4 4 0 0 1 -4 4 h-96 a4 4 0 0 1 -4 -4 v-64 a4 4 0 0 1 4 -4 z" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text x="600" y="398" font-size="16" font-weight="700" fill="#185FA5" text-anchor="middle">HTML</text>
    <text x="600" y="470" font-size="16" font-weight="600" fill="#1c1917" text-anchor="middle">index.html</text>
  </g>
  <text x="600" y="536" font-size="17" fill="#64748b" text-anchor="middle">Drag your file here — then name it index.html</text>

  <!-- commit box -->
  <text x="60" y="646" font-size="14" font-weight="600" fill="#44403c">Commit message</text>
  <rect x="60" y="660" width="760" height="44" rx="10" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="80" y="687" font-size="15" fill="#44403c">add quiz</text>
  <rect x="1000" y="660" width="140" height="44" rx="10" fill="#0F6E56"/>
  <text x="1070" y="687" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Commit</text>
</svg>
