<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="760" fill="#ffffff"/>
  <!-- browser window -->
  <rect x="16" y="16" width="1168" height="728" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <!-- top bar -->
  <circle cx="52" cy="44" r="6.5" fill="#f87171"/>
  <circle cx="74" cy="44" r="6.5" fill="#fbbf24"/>
  <circle cx="96" cy="44" r="6.5" fill="#34d399"/>
  <rect x="150" y="31" width="560" height="26" rx="13" fill="#f5f5f4"/>
  <text x="172" y="49" font-size="14" fill="#78716c">claude.ai</text>
  <line x1="16" y1="76" x2="1184" y2="76" stroke="#e7e5e4" stroke-width="1.5"/>
  <line x1="600" y1="76" x2="600" y2="744" stroke="#e7e5e4" stroke-width="1.5"/>

  <!-- LEFT: chat -->
  <text x="48" y="112" font-size="13" font-weight="600" fill="#a8a29e" letter-spacing="0.5">CONVERSATION</text>
  <!-- user request bubble (right-aligned) -->
  <rect x="300" y="132" width="268" height="78" rx="14" fill="#185FA5"/>
  <text x="322" y="162" font-size="15" fill="#ffffff">Build a welcome page for my</text>
  <text x="322" y="184" font-size="15" fill="#ffffff">course, in calm blue tones.</text>
  <!-- assistant reply -->
  <circle cx="60" cy="250" r="14" fill="#f5f5f4"/>
  <text x="54" y="255" font-size="14" fill="#c2410c">✳</text>
  <text x="88" y="245" font-size="15" fill="#44403c">Done — here is your page.</text>
  <text x="88" y="269" font-size="15" fill="#44403c">Look to the right to see it live.</text>
  <!-- message box -->
  <rect x="48" y="676" width="504" height="44" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="66" y="703" font-size="14" fill="#a8a29e">Ask for one change…</text>

  <!-- RIGHT: artifact preview -->
  <rect x="900" y="92" width="72" height="22" rx="11" fill="#E6F1FB"/>
  <text x="912" y="107" font-size="12" font-weight="600" fill="#185FA5">Preview</text>
  <!-- mock rendered page -->
  <rect x="636" y="132" width="512" height="576" rx="12" fill="#f8fafc" stroke="#e7e5e4" stroke-width="1.5"/>
  <rect x="636" y="132" width="512" height="92" rx="12" fill="#185FA5"/>
  <rect x="636" y="200" width="512" height="24" fill="#185FA5"/>
  <text x="668" y="188" font-size="24" font-weight="700" fill="#ffffff">Welcome to Biology 101</text>
  <text x="668" y="268" font-size="15" fill="#44403c">A short guide to your first weeks in the course.</text>
  <rect x="668" y="298" width="360" height="12" rx="6" fill="#e7e5e4"/>
  <rect x="668" y="322" width="440" height="12" rx="6" fill="#e7e5e4"/>
  <rect x="668" y="346" width="300" height="12" rx="6" fill="#e7e5e4"/>
  <rect x="668" y="392" width="180" height="40" rx="10" fill="#185FA5"/>
  <text x="694" y="418" font-size="14" font-weight="600" fill="#ffffff">Get started</text>
  <rect x="668" y="470" width="220" height="14" rx="7" fill="#e7e5e4"/>
  <rect x="668" y="500" width="440" height="12" rx="6" fill="#eef0f2"/>
  <rect x="668" y="524" width="410" height="12" rx="6" fill="#eef0f2"/>
  <rect x="668" y="548" width="440" height="12" rx="6" fill="#eef0f2"/>
  <rect x="668" y="572" width="360" height="12" rx="6" fill="#eef0f2"/>
</svg>
