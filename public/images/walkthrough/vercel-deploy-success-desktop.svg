  </g>

  <!-- check circle -->
  <circle cx="600" cy="300" r="52" fill="#E1F5EE"/>
  <path d="M576 300 l16 16 l32 -34" fill="none" stroke="#0F6E56" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="600" y="420" font-size="34" font-weight="700" fill="#1c1917" text-anchor="middle">Your project is live!</text>
