  <rect x="610" y="584" width="210" height="48" rx="10" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.5"/>
  <text x="715" y="614" font-size="15" font-weight="600" fill="#44403c" text-anchor="middle">Copy link</text>
