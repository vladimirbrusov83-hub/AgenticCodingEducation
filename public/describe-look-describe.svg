<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" role="img" aria-label="The describe, look, describe loop: step 1 describe, step 2 look, step 3 describe again, then repeat.">
  <style>
    .card { fill: #ffffff; stroke: #e4e7ec; stroke-width: 1.5; }
    .badge { font: 700 11px -apple-system, "Segoe UI", Roboto, sans-serif; letter-spacing: 1px; fill: #0F6E56; }
    .title { font: 800 22px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1a1f2b; }
    .desc  { font: 400 13.5px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #5b6472; }
    .arrow { font: 700 30px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #b7c4bf; }
    .rep   { font: 700 14px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #0F6E56; }
    .ico   { fill: #e7f1ee; }
  </style>

  <!-- Card 1: Describe -->
  <rect class="card" x="40" y="30" width="240" height="180" rx="16"/>
  <circle class="ico" cx="160" cy="70" r="21"/>
  <text class="badge" x="160" y="112" text-anchor="middle">STEP 1</text>
  <text class="title" x="160" y="140" text-anchor="middle">Describe</text>
  <text class="desc"  x="160" y="168" text-anchor="middle">Say what you want</text>
  <text class="desc"  x="160" y="187" text-anchor="middle">in plain words.</text>

  <!-- Arrow -->
  <text class="arrow" x="300" y="130" text-anchor="middle">&#8594;</text>

  <!-- Card 2: Look -->
  <rect class="card" x="320" y="30" width="240" height="180" rx="16"/>
  <circle class="ico" cx="440" cy="70" r="21"/>
  <text class="badge" x="440" y="112" text-anchor="middle">STEP 2</text>
  <text class="title" x="440" y="140" text-anchor="middle">Look</text>
  <text class="desc"  x="440" y="168" text-anchor="middle">Watch it change in</text>
  <text class="desc"  x="440" y="187" text-anchor="middle">the artifact panel.</text>

  <!-- Arrow -->
  <text class="arrow" x="580" y="130" text-anchor="middle">&#8594;</text>

  <!-- Card 3: Describe again -->
  <rect class="card" x="600" y="30" width="240" height="180" rx="16"/>
  <circle class="ico" cx="720" cy="70" r="21"/>
  <text class="badge" x="720" y="112" text-anchor="middle">STEP 3</text>
  <text class="title" x="720" y="140" text-anchor="middle">Describe again</text>
  <text class="desc"  x="720" y="168" text-anchor="middle">Ask for the next</text>
  <text class="desc"  x="720" y="187" text-anchor="middle">change, or a fix.</text>

  <!-- Repeat pill -->
  <rect x="336" y="242" width="208" height="34" rx="17" fill="#e7f1ee"/>
  <text class="rep" x="440" y="264" text-anchor="middle">&#8635; repeat until it&#8217;s right</text>
</svg>
