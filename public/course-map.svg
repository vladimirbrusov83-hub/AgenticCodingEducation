<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 626" role="img" aria-label="Course map: 14 modules across three levels. Level 1 Foundations (modules 1-5): you can build software now, meet your AI builder, prompting for builders, what is a website, plan before you build. Level 2 Applied (modules 6-10): your toolbox, Build 1 a class quiz app, getting it online, fixing and changing things, Build 2 a flashcard study site. Level 3 Advanced (modules 11-14): meet Claude Code, Build 3 a full course portal, building responsibly, good habits costs and capstone. The three builds are live tools you ship to the internet.">
